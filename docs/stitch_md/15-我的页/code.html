<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;900&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#FF7E45",
                        "primary-container": "#FFDBCE",
                        "on-primary-container": "#682300",
                        "secondary": "#006e1c",
                        "secondary-container": "#91f78e",
                        "tertiary": "#705d00",
                        "background": "#FFF8F6",
                        "surface": "#FFF8F6",
                        "surface-variant": "#F4DED6",
                        "on-surface": "#241915",
                        "outline": "#8B7268",
                        "warm-orange": "#FFF3E0",
                        "healing-green": "#E8F5E9",
                        "quiet-blue": "#E3F2FD",
                        "text-primary": "#2D3436",
                        "text-secondary": "#636E72"
                    },
                    "borderRadius": {
                        "DEFAULT": "8px",
                        "lg": "12px",
                        "xl": "16px",
                        "2xl": "20px",
                        "3xl": "24px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "section-gap": "28px",
                        "card-padding": "20px",
                        "margin-page": "20px"
                    },
                    "fontFamily": {
                        "be-vietnam-pro": ["Be Vietnam Pro", "sans-serif"],
                        "jakarta": ["Plus Jakarta Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bean-gradient {
            background: linear-gradient(90deg, #FF7E45 0%, #FFB598 100%);
        }
    </style>

<body class="bg-background text-on-surface font-jakarta min-h-screen pb-28">
<!-- TopAppBar -->
<header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center px-5 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">person_pin</span>
<span class="font-be-vietnam-pro font-bold text-lg">我的</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-zinc-500">settings</span>
</button>
</header>
<main class="px-margin-page space-y-section-gap pt-4">
<!-- Header: Profile & Mood & Beans -->
<section class="bg-white rounded-3xl p-card-padding shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-primary-container/20 flex flex-col gap-5"><div class="flex items-center gap-4">
<!-- Avatar -->
<div class="relative flex-shrink-0">
<div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center border-2 border-white shadow-sm">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">face</span>
</div>
</div>
<!-- Info & Beans -->
<div class="flex flex-1 items-center"><div>
<h2 class="text-xl font-bold text-on-surface">酥饼大人</h2>
<div class="flex items-center gap-1.5 mt-1">
<span class="material-symbols-outlined text-[#8D4E2A] text-sm" style="font-variation-settings: 'FILL' 1;">egg_alt</span>
<span class="text-sm font-bold text-[#8D4E2A]">128 豆子</span>
</div>
</div></div>
</div>
<div class="h-[1px] bg-primary-container/20 w-full my-1"></div>
<!-- Single line of tags -->
<div class="flex gap-2 overflow-x-auto hide-scrollbar">
<span class="bg-healing-green text-[#2E7D32] text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">#社畜回血</span>
<span class="bg-red-50 text-[#E57373] text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">#恋爱ing</span>
<span class="bg-quiet-blue text-[#1E88E5] text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">#寻找宁静</span>

<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-black/5 group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary text-2xl">sentiment_satisfied</span>
</div>
<span class="text-[12px] font-bold text-text-secondary">情绪管理</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-black/5 group-active:scale-90 transition-transform">

</div>
<span class="text-[12px] font-bold text-text-secondary">兴趣标签</span>

</div>

</section>

<a class="flex flex-col items-center justify-center text-zinc-400 px-6 py-1.5 transition-all active:scale-90" href="#">

<a class="flex flex-col items-center justify-center text-primary bg-primary/10 rounded-2xl px-6 py-1.5 transition-all active:scale-95" href="#">

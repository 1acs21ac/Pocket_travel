            @apply bg-white border-outline-variant text-on-surface-variant;
        }

<nav class="bg-white/80 dark:bg-stone-900/80 backdrop-blur-md border-b border-orange-100/50 dark:border-stone-800 shadow-sm docked full-width top-0 sticky z-50 flex justify-between items-center px-4 h-16 w-full">

</div>

<div class="w-20 h-20 flex-shrink-0 bg-white rounded-full overflow-hidden shadow-sm">

<h3 class="font-label-caps text-label-caps text-outline mb-gutter-grid flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">explore</span> 热门探索

<button class="px-5 py-2.5 rounded-xl border-2 border-outline-variant bg-white text-on-surface-variant font-body-lg text-body-lg hover:border-primary active:scale-95 transition-all">

<button class="px-5 py-2.5 rounded-xl border-2 border-outline-variant bg-white text-on-surface-variant font-body-lg text-body-lg hover:border-primary active:scale-95 transition-all">

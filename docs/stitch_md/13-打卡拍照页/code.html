<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-card": "#FFFFFF",
                    "tertiary-fixed": "#ffe16d",
                    "outline-variant": "#dfc0b5",
                    "photo-yellow": "#FFC107",
                    "surface-bright": "#fff8f6",
                    "warm-orange": "#FFF3E0",
                    "quiet-blue": "#E3F2FD",
                    "on-primary": "#ffffff",
                    "surface-container": "#ffe9e2",
                    "surface": "#fff8f6",
                    "on-primary-container": "#682300",
                    "on-surface-variant": "#57423a",
                    "on-error": "#ffffff",
                    "text-primary": "#2D3436",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#ffede7",
                    "background-subtle": "#F8F9FA",
                    "on-secondary-container": "#00731e",
                    "tertiary-fixed-dim": "#e9c400",
                    "surface-container-low": "#fff1ec",
                    "on-surface": "#241915",
                    "on-background": "#241915",
                    "background": "#fff8f6",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#ff7e45",
                    "primary": "#a53c02",
                    "healing-green": "#E8F5E9",
                    "secondary-container": "#91f78e",
                    "bean-brown": "#8D6E63",
                    "inverse-surface": "#3b2e29"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "xxl": "1.5rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "card-padding": "16px",
                    "margin-page": "16px",
                    "gutter-grid": "12px",
                    "stack-tight": "8px",
                    "section-gap": "24px"
            },
            "fontFamily": {
                    "headline-xl": ["Be Vietnam Pro"],
                    "headline-lg": ["Be Vietnam Pro"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "label-caps": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "stat-bean": ["Be Vietnam Pro"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
        }
        .emotion-card-selected {
            border: 2px solid #a53c02;
            background-color: #ffe9e2;
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen font-body-md text-on-surface">
<!-- TopAppBar -->
<header class="bg-orange-50/80 dark:bg-zinc-900/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-orange-100 dark:border-zinc-800 shadow-sm flex justify-between items-center px-4 h-16 w-full">
<button class="active:scale-95 transition-transform hover:bg-orange-100/50 dark:hover:bg-zinc-800 p-2 rounded-full">
<span class="material-symbols-outlined text-orange-600 dark:text-orange-400">arrow_back</span>
</button>
<h1 class="font-be-vietnam-pro font-bold text-lg text-orange-600 dark:text-orange-400">记录游玩时刻</h1>
<button class="active:scale-95 transition-transform hover:bg-orange-100/50 dark:hover:bg-zinc-800 p-2 rounded-full">
<span class="material-symbols-outlined text-orange-600 dark:text-orange-400">share</span>
</button>
</header>
<main class="pt-20 pb-32 px-margin-page space-y-section-gap">
<!-- Image Upload Section -->
<section class="grid grid-cols-3 gap-gutter-grid">
<div class="aspect-square bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
<span class="text-[10px] font-label-caps">上传照片</span>
</div>
<div class="aspect-square bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
<span class="text-[10px] font-label-caps">上传照片</span>
</div>
<div class="aspect-square bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
<span class="text-[10px] font-label-caps">上传照片</span>
</div>
</section>
<!-- Emotion Section -->
<section class="space-y-stack-tight">
<div class="flex items-center justify-between">
<h3 class="font-headline-lg text-headline-lg text-on-surface">这一刻的心情</h3>
<div class="bg-primary-container/10 px-3 py-1 rounded-full flex items-center gap-1">
<span class="text-primary text-[12px] font-bold">治愈中</span>
</div>
</div>
<div class="flex gap-4 overflow-x-auto py-2 custom-scrollbar">
<div class="flex-shrink-0 flex flex-col items-center gap-2 px-4 py-3 rounded-xxl bg-surface-card border border-orange-100 shadow-sm active:scale-95 transition-all emotion-card-selected">
<div class="text-3xl">🌿</div>
<span class="text-label-caps font-label-caps text-primary">治愈</span>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-2 px-4 py-3 rounded-xxl bg-surface-card border border-orange-100 shadow-sm active:scale-95 transition-all">
<div class="text-3xl">💓</div>
<span class="text-label-caps font-label-caps text-text-secondary">心动</span>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-2 px-4 py-3 rounded-xxl bg-surface-card border border-orange-100 shadow-sm active:scale-95 transition-all">
<div class="text-3xl">😫</div>
<span class="text-label-caps font-label-caps text-text-secondary">疲惫</span>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-2 px-4 py-3 rounded-xxl bg-surface-card border border-orange-100 shadow-sm active:scale-95 transition-all">
<div class="text-3xl">😲</div>
<span class="text-label-caps font-label-caps text-text-secondary">震撼</span>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-2 px-4 py-3 rounded-xxl bg-surface-card border border-orange-100 shadow-sm active:scale-95 transition-all">
<div class="text-3xl">🧘</div>
<span class="text-label-caps font-label-caps text-text-secondary">佛系</span>
</div>
</div>
</section>
<!-- Input Section -->
<section class="space-y-stack-tight">
<textarea class="w-full h-32 p-card-padding bg-surface-card rounded-xxl border-none ring-1 ring-orange-100 focus:ring-2 focus:ring-primary-container transition-all resize-none font-body-md text-on-surface-variant placeholder:text-text-secondary/50 shadow-inner" placeholder="写下你的干货建议，帮助更多搭子..."></textarea>
</section>
<!-- Tags Section -->
<section class="space-y-stack-tight">
<h3 class="font-headline-lg text-headline-lg text-on-surface">添加标签</h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-warm-orange text-primary font-label-caps text-label-caps border border-primary/20 active:scale-95 transition-all">最佳机位</button>
<button class="px-4 py-2 rounded-full bg-surface-card text-text-secondary font-label-caps text-label-caps border border-orange-100 active:scale-95 transition-all">便民服务</button>
<button class="px-4 py-2 rounded-full bg-surface-card text-text-secondary font-label-caps text-label-caps border border-orange-100 active:scale-95 transition-all">避坑指南</button>
<button class="px-4 py-2 rounded-full bg-surface-card text-text-secondary font-label-caps text-label-caps border border-orange-100 active:scale-95 transition-all">周边觅食</button>
<button class="px-4 py-2 rounded-full bg-surface-card text-text-secondary font-label-caps text-label-caps border border-orange-100 active:scale-95 transition-all">
<span class="material-symbols-outlined text-sm mr-1">add</span>新增
                </button>
</div>
</section>
<!-- Location Widget -->
<section class="bg-white/60 p-4 rounded-xxl border border-orange-100 flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">location_on</span>
</div>
<div class="flex-1">
<p class="text-body-md font-bold text-on-surface">上海·武康大楼</p>
<p class="text-[12px] text-text-secondary">徐汇区淮海中路1850号</p>
</div>
<span class="material-symbols-outlined text-text-secondary">chevron_right</span>
</section>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 w-full p-margin-page bg-white/80 backdrop-blur-lg border-t border-orange-100 z-50">
<button class="w-full py-4 bg-primary text-on-primary rounded-xxl font-headline-lg text-headline-lg shadow-[0_8px_24px_rgba(165,60,2,0.3)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>发布并赚取 10</span>
<div class="flex items-center gap-1 bg-white/20 px-2 py-0.5 rounded-full">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">fiber_smart_record</span>
<span class="text-stat-bean font-stat-bean">豆子</span>
</div>
</button>
</footer>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[20%] left-[-5%] w-[250px] h-[250px] bg-orange-200/20 rounded-full blur-3xl"></div>
</div>
</body></html>

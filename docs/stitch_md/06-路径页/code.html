<style>

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .path-timeline-connector::after {
            content: '';
            position: absolute;
            left: 20px;
            top: 40px;
            bottom: -20px;
            border-left: 2px dotted #dfc0b5;
        }
        .path-timeline-item:last-child .path-timeline-connector::after {
            display: none;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);

<h1 class="font-['Be_Vietnam_Pro'] font-bold text-lg text-orange-600 tracking-tight">口袋旅行</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-orange-500" data-icon="light_mode">light_mode</span>

<main class="pt-20 px-4 max-w-md mx-auto space-y-6">

</button>
</section>

                    正在进行

</div>
</div>

</button>

<span class="material-symbols-outlined" data-icon="wb_sunny">wb_sunny</span>
<span class="text-xs font-medium">24°C</span>
</button>

</div>

</div>
</div>

</div>
</div>
</div>
</div>

<div class="space-y-4">
<div class="flex items-center gap-2">
<span class="text-bean-brown font-bold text-sm tracking-widest uppercase">八月 2023</span>

<div class="absolute left-0 top-1 w-10 flex justify-center path-timeline-connector">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant ring-4 ring-surface-container-low"></div>
</div>
<div class="bg-surface-card rounded-2xl p-3 flex gap-4 border border-outline-variant/10 shadow-sm">
<div class="w-16 h-16 rounded-lg bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-outline" data-icon="image">image</span>

</button>

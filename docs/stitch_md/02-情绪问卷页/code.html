<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>口袋旅行搭子 - 情绪地图</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#bfa100",
                        "surface-bright": "#fff8f6",
                        "on-secondary-container": "#00731e",
                        "inverse-on-surface": "#ffede7",
                        "background": "#fff8f6",
                        "on-primary-fixed": "#370e00",

                        "primary-container": "#ff7e45",
                        "secondary-container": "#91f78e",
                        "outline-variant": "#dfc0b5",
                        "inverse-surface": "#3b2e29",
                        "text-primary": "#2D3436",
                        "on-secondary-fixed": "#002204",
                        "surface-container-high": "#fae4dc",
                        "quiet-blue": "#E3F2FD",
                        "surface-card": "#FFFFFF",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#fff1ec",
                        "text-secondary": "#636E72",
                        "surface-container-highest": "#f4ded6",
                        "tertiary-fixed-dim": "#e9c400",
                        "warm-orange": "#FFF3E0",
                        "surface-dim": "#ebd6ce",
                        "on-primary-container": "#682300",
                        "on-tertiary-fixed": "#221b00",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffb598",
                        "background-subtle": "#F8F9FA",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#005313",
                        "tertiary-fixed": "#ffe16d",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "stress-red": "#FF5252",
                        "on-tertiary-fixed-variant": "#544600",
                        "surface-tint": "#a53c02",
                        "secondary": "#006e1c",
                        "photo-yellow": "#FFC107",
                        "outline": "#8b7268",
                        "surface-container": "#ffe9e2",
                        "on-background": "#241915",
                        "primary-fixed": "#ffdbce",
                        "primary": "#a53c02",
                        "secondary-fixed": "#94f990",
                        "on-surface-variant": "#57423a",
                        "surface": "#fff8f6",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#78dc77",
                        "on-tertiary-container": "#453800",
                        "bean-brown": "#8D6E63",
                        "on-primary": "#ffffff",
                        "healing-green": "#E8F5E9",
                        "on-primary-fixed-variant": "#7e2c00",
                        "surface-variant": "#f4ded6",
                        "tertiary": "#705d00",
                        "on-surface": "#241915",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "card-padding": "16px",
                        "margin-page": "16px",
                        "stack-tight": "8px",
                        "gutter-grid": "12px",
                        "section-gap": "24px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Be Vietnam Pro", "sans-serif"],
                        "body-md": ["Plus Jakarta Sans", "sans-serif"],
                        "stat-bean": ["Be Vietnam Pro", "sans-serif"],
                        "body-lg": ["Plus Jakarta Sans", "sans-serif"],
                        "label-caps": ["Plus Jakarta Sans", "sans-serif"],
                        "headline-lg": ["Be Vietnam Pro", "sans-serif"]
                    },
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .card-squish {
            box-shadow: 0 8px 24px rgba(255, 126, 69, 0.08);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-squish:active {
            transform: scale(0.98);
        }
        .option-button {
            transition: all 0.3s ease;
        }
        .option-button:active {
            transform: scale(0.95);
        }
        .progress-buddy {
            transition: left 0.5s ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-bright min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- TopAppBar Section -->
<header class="flex justify-between items-center px-4 py-3 w-full sticky top-0 bg-orange-50/80 dark:bg-zinc-950/80 backdrop-blur-xl z-50 border-none shadow-none">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="User avatar" class="w-full h-full object-cover" data-alt="a friendly cartoon character avatar with a soft smile and warm orange background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmH8lz6APc-_eZickTKk8XB9UgqsTj7nio79dz4T8abI7qcf3euoBE1KIU3WySo1bBgLOvg3ESRi-aFyQEUdGPoAHg-Ef_WyelOtKJ0F8BbBF_YrZYbwOulBlgV07sO9ez9ITiqd5i5ElwYfJagf6sV-wYq7DDZrxYVxkOL__KNmIC15rmSXxm194RGgOF3abmnGRbhIUhEVOTKUi7NjrqDyErKBIZw5tKTWYWeOLYnFgAY8ToDuHTd6Xg5qnevp6Fyx7ibFxlQrI"/>
</div>
</div>
<h1 class="text-xl font-black text-orange-600 dark:text-orange-500 tracking-tight font-headline-xl">口袋旅行搭子</h1>
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-orange-500 dark:text-orange-400" data-icon="notifications">notifications</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 relative">
<!-- Progress Section -->
<div class="w-full max-w-sm mb-8">
<div class="flex justify-between items-end mb-4">
<div class="flex flex-col">
<span class="text-primary font-headline-xl font-bold">02<span class="text-zinc-400 text-lg font-normal">/07</span></span>
<span class="text-text-secondary text-label-caps">情绪探索中...</span>
</div>
<div class="bg-healing-green px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-on-secondary-container text-sm" data-icon="auto_awesome">auto_awesome</span>
<span class="text-on-secondary-container text-xs font-semibold">Healing Mood</span>
</div>
</div>
<div class="relative w-full h-3 bg-surface-container-high rounded-full overflow-hidden">
<!-- Progress Fill -->
<div class="absolute left-0 top-0 h-full bg-primary-container rounded-full" style="width: 28.5%;"></div>
<!-- Buddy Indicator -->
<div class="absolute progress-buddy top-1/2 -translate-y-1/2 -ml-2" style="left: 28.5%;">
<div class="bg-white rounded-full shadow-md p-0.5 border border-primary-container/20">
<span class="material-symbols-outlined text-primary text-[16px] block" data-icon="directions_walk">directions_walk</span>
</div>
</div>
</div>
</div>
<!-- Question Card -->
<div class="w-full max-w-sm aspect-[4/5] bg-white rounded-[40px] p-8 flex flex-col items-center text-center card-squish border border-orange-100/30 relative">
<!-- Decorative Element -->
<div class="absolute -top-6 w-20 h-20 bg-warm-orange rounded-3xl rotate-12 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="psychology">psychology</span>
</div>
<div class="mt-10 flex-1 flex flex-col gap-6 w-full">
<h2 class="text-headline-xl text-text-primary leading-tight px-2">你现在的状态/心情是怎样的？</h2>
<div class="flex flex-col gap-3 w-full mt-4">
<!-- Option 1 -->
<button class="option-button w-full py-4 px-6 rounded-2xl border-2 border-surface-container hover:border-primary-container hover:bg-orange-50 flex items-center justify-between group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-stress-red group-hover:scale-110 transition-transform" data-icon="work_alert">work_alert</span>
<span class="text-body-lg text-text-primary">工作压力大</span>
</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-primary-container" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 2 -->
<button class="option-button w-full py-4 px-6 rounded-2xl border-2 border-surface-container hover:border-primary-container hover:bg-orange-50 flex items-center justify-between group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-400 group-hover:scale-110 transition-transform" data-icon="heart_broken">heart_broken</span>
<span class="text-body-lg text-text-primary">失恋低落</span>
</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-primary-container" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 3 -->
<button class="option-button w-full py-4 px-6 rounded-2xl border-2 border-surface-container hover:border-primary-container hover:bg-orange-50 flex items-center justify-between group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-photo-yellow group-hover:scale-110 transition-transform" data-icon="celebration">celebration</span>
<span class="text-body-lg text-text-primary">心情很好想庆祝</span>
</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-primary-container" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 4 -->
<button class="option-button w-full py-4 px-6 rounded-2xl border-2 border-surface-container hover:border-primary-container hover:bg-orange-50 flex items-center justify-between group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-bean-brown group-hover:scale-110 transition-transform" data-icon="cottage">cottage</span>
<span class="text-body-lg text-text-primary">在家待腻了</span>
</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-primary-container" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Bottom Illustration peeking -->
</div>
<!-- Hint Footer -->
<div class="mt-8 flex flex-col items-center gap-2 opacity-60">
<div class="flex items-center gap-2 text-text-secondary text-body-md">
<span class="material-symbols-outlined text-sm animate-pulse" data-icon="keyboard_double_arrow_left">keyboard_double_arrow_left</span>
<span>向左滑动跳过</span>
</div>
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
</div>
</main>
<!-- Success Feedback Overlay (Hidden by default, used for conceptual interaction) -->
<div class="hidden fixed inset-0 z-50 flex items-center justify-center bg-white/60 backdrop-blur-md">
<div class="bg-white p-8 rounded-[32px] shadow-2xl flex flex-col items-center gap-4 text-center">
<div class="w-20 h-20 bg-healing-green rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" data-icon="done_all" style="font-variation-settings: 'wght' 700;">done_all</span>
</div>
<h3 class="font-headline-lg text-text-primary">记下来啦！</h3>
<p class="text-text-secondary text-body-md">正在为你匹配最懂你的路线...</p>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
<div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary-container/10 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[10%] right-[5%] w-80 h-80 bg-healing-green/20 blur-[120px] rounded-full"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-5">
<!-- Asymmetric Grid/Texture Pattern could go here -->
</div>
</div>
</body></html>

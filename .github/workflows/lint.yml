name: Lint Check

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Check dev rule exists
        run: |
          if [ ! -s .dev.rule ]; then
            echo ".dev.rule 文件为空或不存在"
            exit 1
          fi
